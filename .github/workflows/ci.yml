name: CI

on:
  push:
    branches: [ master ]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }} · ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        config: [default, no_crypto]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # libsodium is optional: when present the default leg builds the sodium
      # backend and the cross-backend equivalence test runs; the no_crypto leg
      # always uses the vendored ref10. Installing it here exercises both.
      - name: Install libsodium
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq libsodium-dev pkg-config
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install libsodium pkg-config || true
            echo "PKG_CONFIG_PATH=$(brew --prefix libsodium)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DTXCHAIN_BUILD_TESTS=ON
          -DTXCHAIN_NO_CRYPTO=${{ matrix.config == 'no_crypto' && 'ON' || 'OFF' }}

      - name: Build (-Werror)
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # NO_CRYPTO must never fake verification (Architecture Crypto §9). This
      # source scan fails if a `return true` is guarded by a crypto NO_CRYPTO
      # #ifdef. (Also registered as the `no_crypto_guard` ctest above.)
      - name: Guard — no fake verify
        run: bash scripts/check_no_fake_verify.sh .

  # Placeholder: the dedicated ThreadSanitizer / ASan+UBSan integration job is
  # Pillar 5's concern (CRE-219, m5-sanitizer-builds-ci). Intentionally NOT wired
  # here — the TXCHAIN_SANITIZE option exists but is exercised by that ticket.
  # sanitizers:
  #   runs-on: ubuntu-22.04
  #   steps: ...
